<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mission Status Dashboard</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      font-family: Arial, sans-serif;
      color: #f8fafc;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background-color: #1e293b;
      padding: 40px;
      border-radius: 14px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.4);
      width: 420px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .env {
      font-size: 18px;
      margin-bottom: 20px;
    }

    .status {
      font-size: 26px;
      font-weight: bold;
      color: #22c55e;
    }

    .footer {
      margin-top: 20px;
      font-size: 14px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Mission Status Dashboard</h1>
      <div class="env">Environment: Dev</div>
      <div>Application Status:</div>
      <div class="status">OPERATIONAL</div>
      <div class="footer">DevOps Practice Project</div>
    </div>
  </div>
</body>
</html>
