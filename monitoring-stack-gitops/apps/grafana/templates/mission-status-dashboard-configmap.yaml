apiVersion: v1
kind: ConfigMap
metadata:
  name: mission-status-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  mission-status-overview.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "panels": [
        {
          "type": "timeseries",
          "title": "Pod Count by Namespace",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "count(kube_pod_info) by (namespace)",
              "legendFormat": "{{namespace}}",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "kubernetes",
        "demo"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "title": "Mission Status Kubernetes Overview",
      "version": 1
    }
