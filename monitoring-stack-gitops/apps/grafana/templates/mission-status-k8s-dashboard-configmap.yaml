apiVersion: v1
kind: ConfigMap
metadata:
  name: mission-status-k8s-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  mission-status-k8s-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "panels": [
        {
          "type": "stat",
          "title": "Mission Status Running Pods",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{namespace=\"mission-dev\",phase=\"Running\"})",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Mission Status Desired Replicas",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "kube_deployment_spec_replicas{namespace=\"mission-dev\",deployment=\"mission-status\"}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Mission Status Available Replicas",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_available{namespace=\"mission-dev\",deployment=\"mission-status\"}",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Mission Status Container Restarts",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"mission-dev\"})",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Mission Status Pod Count",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace=\"mission-dev\"})",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Mission Status Pod Restarts Rate",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [
            {
              "expr": "sum(rate(kube_pod_container_status_restarts_total{namespace=\"mission-dev\"}[5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Cluster CPU Usage %",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [
            {
              "expr": "100 * (1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Cluster Memory Usage %",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [
            {
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "style": "dark",
      "tags": ["mission-status", "kubernetes"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Mission Status Kubernetes Dashboard",
      "version": 1
    }
